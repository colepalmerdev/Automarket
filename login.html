        // Login functionality

                this.init();
            }
            
            init() {
                // Form submission
                this.form.addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.handleLogin();

                // Password toggle
                this.passwordToggle.addEventListener('click', () => {

                });
                
                // Social login buttons

                    this.handleSocialLogin('google');

                document.getElementById('facebook-login').addEventListener('click', () => {
                    this.handleSocialLogin('facebook');
                });
                
                // Clear errors on input
                document.getElementById('email').addEventListener('input', () => {
                    this.clearFieldError('email');
                });
                
                document.getElementById('password').addEventListener('input', () => {
                    this.clearFieldError('password');
                });
            }
            
            togglePassword() {
                const type = this.passwordInput.type === 'password' ? 'text' : 'password';
                this.passwordInput.type = type;
                
                const icon = this.passwordToggle.querySelector('i');
                icon.className = type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
            }
            
            validateForm() {
                let isValid = true;
                const email = document.getElementById('email').value.trim();
                const password = document.getElementById('password').value;
                
                // Clear previous errors
                this.clearAllErrors();
                
                // Email validation
                if (!email) {
                    this.showFieldError('email', 'Email is required');
                    isValid = false;
                } else if (!this.isValidEmail(email)) {
                    this.showFieldError('email', 'Please enter a valid email address');
                    isValid = false;
                }
                
                // Password validation
                if (!password) {
                    this.showFieldError('password', 'Password is required');
                    isValid = false;
                } else if (password.length < 6) {
                    this.showFieldError('password', 'Password must be at least 6 characters');
                    isValid = false;
                }
                
                return isValid;
            }
            
            isValidEmail(email) {
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return emailRegex.test(email);
            }
            
            showFieldError(field, message) {
                const errorElement = document.getElementById(`${field}-error`);
                if (errorElement) {
                    errorElement.textContent = message;
                    errorElement.style.display = 'block';
                }
            }
            
            clearFieldError(field) {
                const errorElement = document.getElementById(`${field}-error`);
                if (errorElement) {
                    errorElement.textContent = '';
                    errorElement.style.display = 'none';
                }
            }
            
            clearAllErrors() {
                this.clearFieldError('email');
                this.clearFieldError('password');
                this.clearAlerts();
            }
            
            showAlert(message, type = 'error') {
                const alertDiv = document.createElement('div');
                alertDiv.className = `alert alert-${type}`;
                
                const icon = type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle';
                alertDiv.innerHTML = `
                    <i class="fas ${icon}"></i>
                    <span>${message}</span>
                `;
                
                this.alertContainer.innerHTML = '';
                this.alertContainer.appendChild(alertDiv);
                
                // Auto-hide success messages
                if (type === 'success') {
                    setTimeout(() => {
                        this.clearAlerts();
                    }, 5000);
                }
            }
            
            clearAlerts() {
                this.alertContainer.innerHTML = '';
            }
            
            setLoading(loading) {
                if (loading) {
                    this.loginButton.classList.add('loading');
                    this.loginButton.disabled = true;
                } else {
                    this.loginButton.classList.remove('loading');
                    this.loginButton.disabled = false;
                }
            }
            
            async handleLogin() {
                if (!this.validateForm()) {
                    return;
                }
                
                const formData = new FormData(this.form);
                const data = {
                    email: formData.get('email'),
                    password: formData.get('password'),
                    remember: formData.get('remember') ? '1' : '0'
                };
                
                console.log('Login attempt with data:', { email: data.email, remember: data.remember });
                
                this.setLoading(true);
                
                try {
                    const response = await fetch('login-direct.php', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/x-www-form-urlencoded',
                        },
                        body: new URLSearchParams(data),
                        credentials: 'same-origin'
                    });
                    
                    console.log('Login response status:', response.status);
                    
                    const result = await this.handleResponse(response);
                    console.log('Login result:', result);
                    
                    if (result.success) {
                        this.showAlert('Login successful! Redirecting...', 'success');
                        setTimeout(() => {
                            console.log('Redirecting to:', result.redirect || 'index.html');
                            window.location.href = result.redirect || 'index.html';
                        }, 1500);
                    } else {
                        this.showAlert(result.message || 'Login failed. Please try again.');
                        console.log('Login failed:', result.message);
                    }
                } catch (error) {
                    console.error('Login error:', error);
                    this.showAlert('Network error. Please check your connection and try again.');
                } finally {
                    this.setLoading(false);
                }
            }
            
            async handleResponse(response) {
                // Check if response is a redirect (successful login)
                if (response.redirected) {
                    return {
                        success: true,
                        redirect: response.url
                    };
                }
                
                // Try to parse as JSON, fallback to text
                const contentType = response.headers.get('content-type');
                
                if (contentType && contentType.includes('application/json')) {
                    return await response.json();
                }
                
                const text = await response.text();
                
                // Check if it's an HTML page with error
                if (text.includes('alert alert-error')) {
                    const errorMatch = text.match(/<div[^>]*class="alert alert-error"[^>]*>(.*?)<\/div>/s);
                    if (errorMatch) {
                        const errorText = errorMatch[1].replace(/<[^>]*>/g, '').trim();
                        return {
                            success: false,
                            message: errorText
                        };
                    }
                }
                
                // Check for PHP error messages
                if (text.includes('Invalid email or password')) {
                    return {
                        success: false,
                        message: 'Invalid email or password'
                    };
                }
                
                // If we get here, assume success based on status
                if (response.ok) {
                    return {
                        success: true,
                        redirect: 'dashboard.php'
                    };
                }
                
                return {
                    success: false,
                    message: 'Login failed. Please try again.'
                };
            }
            
            handleSocialLogin(provider) {
                // Placeholder for social login
                this.showAlert(`${provider.charAt(0).toUpperCase() + provider.slice(1)} login coming soon!`, 'error');
                
                // In a real implementation, you would redirect to the OAuth provider
                // window.location.href = `auth/${provider}.php`;
            }
        }
        
        // Initialize login handler when DOM is ready
        document.addEventListener('DOMContentLoaded', () => {
            new LoginHandler();
        });

                animation: slideIn 0.3s ease;
            `;
            toast.textContent = message;
            
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => {
                    document.body.removeChild(toast);
                }, 300);
            }, 3000);
        }
        
        // Add slide animations

                from { transform: translateX(0); opacity: 1; }
                to { transform: translateX(100%); opacity: 0; }
            }
        `;
        document.head.appendChild(style);
    </script>
