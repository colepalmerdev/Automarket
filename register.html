  <!--  <script src="assets/js/script.js"></script>
    
    <script>
        // Registration functionality
        class RegistrationHandler {
            constructor() {
                this.form = document.getElementById('register-form');
                this.registerButton = document.getElementById('register-button');
                this.alertContainer = document.getElementById('alert-container');
                this.passwordToggle = document.getElementById('password-toggle');
                this.confirmPasswordToggle = document.getElementById('confirm-password-toggle');
                this.passwordInput = document.getElementById('password');
                this.confirmPasswordInput = document.getElementById('confirm_password');
                
                this.init();
            }
            
            init() {
                // Form submission
                this.form.addEventListener('submit', (e) => {
                    e.preventDefault();
                    this.handleRegistration();
                });
                
                // Password toggles
                this.passwordToggle.addEventListener('click', () => {
                    this.togglePassword('password', 'password-toggle');
                });
                
                this.confirmPasswordToggle.addEventListener('click', () => {
                    this.togglePassword('confirm_password', 'confirm-password-toggle');
                });
                
                // Password strength checker
                this.passwordInput.addEventListener('input', () => {
                    this.checkPasswordStrength();
                    this.clearFieldError('password');
                });
                
                // Real-time password match validation
                this.confirmPasswordInput.addEventListener('input', () => {
                    this.validatePasswordMatch();
                    this.clearFieldError('confirm_password');
                });
                
                // Social registration buttons
                document.getElementById('google-register').addEventListener('click', () => {
                    this.handleSocialRegistration('google');
                });
                
                document.getElementById('facebook-register').addEventListener('click', () => {
                    this.handleSocialRegistration('facebook');
                });
                
                // Clear errors on input
                ['first_name', 'last_name', 'email', 'phone', 'role'].forEach(field => {
                    document.getElementById(field).addEventListener('input', () => {
                        this.clearFieldError(field);
                    });
                });
            }
            
            togglePassword(fieldId, toggleId) {
                const input = document.getElementById(fieldId);
                const toggle = document.getElementById(toggleId);
                const type = input.type === 'password' ? 'text' : 'password';
                input.type = type;
                
                const icon = toggle.querySelector('i');
                icon.className = type === 'password' ? 'fas fa-eye' : 'fas fa-eye-slash';
            }
            
            checkPasswordStrength() {
                const password = this.passwordInput.value;
                const strengthBar = document.getElementById('strength-bar');
                
                if (!password) {
                    strengthBar.className = 'password-strength-bar';
                    return;
                }
                
                let strength = 0;
                
                // Length check
                if (password.length >= 8) strength++;
                if (password.length >= 12) strength++;
                
                // Complexity checks
                if (/[a-z]/.test(password) && /[A-Z]/.test(password)) strength++;
                if (/[0-9]/.test(password)) strength++;
                if (/[^a-zA-Z0-9]/.test(password)) strength++;
                
                strengthBar.className = 'password-strength-bar';
                
                if (strength <= 2) {
                    strengthBar.classList.add('strength-weak');
                } else if (strength <= 3) {
                    strengthBar.classList.add('strength-medium');
                } else {
                    strengthBar.classList.add('strength-strong');
                }
            }
            
            validatePasswordMatch() {
                const password = this.passwordInput.value;
                const confirmPassword = this.confirmPasswordInput.value;
                
                if (confirmPassword) {
                    if (password !== confirmPassword) {
                        this.confirmPasswordInput.style.borderColor = '#ef4444';
                        this.showFieldError('confirm_password', 'Passwords do not match');
                    } else {
                        this.confirmPasswordInput.style.borderColor = '#22c55e';
                        this.clearFieldError('confirm_password');
                    }
                }
            }
            
            validateForm() {
                let isValid = true;
                const formData = new FormData(this.form);
                
                // Clear previous errors
                this.clearAllErrors();
                
                // First name validation
                const firstName = formData.get('first_name').trim();
                if (!firstName) {
                    this.showFieldError('first_name', 'First name is required');
                    isValid = false;
                } else if (firstName.length < 2) {
                    this.showFieldError('first_name', 'First name must be at least 2 characters');
                    isValid = false;
                }
                
                // Last name validation
                const lastName = formData.get('last_name').trim();
                if (!lastName) {
                    this.showFieldError('last_name', 'Last name is required');
                    isValid = false;
                } else if (lastName.length < 2) {
                    this.showFieldError('last_name', 'Last name must be at least 2 characters');
                    isValid = false;
                }
                
                // Email validation
                const email = formData.get('email').trim();
                if (!email) {
                    this.showFieldError('email', 'Email is required');
                    isValid = false;
                } else if (!this.isValidEmail(email)) {
                    this.showFieldError('email', 'Please enter a valid email address');
                    isValid = false;
                }
                
                // Phone validation (optional but if provided, should be valid)
                const phone = formData.get('phone').trim();
                if (phone && !this.isValidPhone(phone)) {
                    this.showFieldError('phone', 'Please enter a valid phone number');
                    isValid = false;
                }
                
                // Role validation
                const role = formData.get('role');
                if (!role) {
                    this.showFieldError('role', 'Please select an account type');
                    isValid = false;
                }
                
                // Password validation
                const password = formData.get('password');
                if (!password) {
                    this.showFieldError('password', 'Password is required');
                    isValid = false;
                } else if (password.length < 8) {
                    this.showFieldError('password', 'Password must be at least 8 characters long');
                    isValid = false;
                }
                
                // Confirm password validation
                const confirmPassword = formData.get('confirm_password');
                if (!confirmPassword) {
                    this.showFieldError('confirm_password', 'Please confirm your password');
                    isValid = false;
                } else if (password !== confirmPassword) {
                    this.showFieldError('confirm_password', 'Passwords do not match');
                    isValid = false;
                }
                
                // Terms validation
                const terms = formData.get('terms');
                if (!terms) {
                    this.showAlert('You must agree to the terms and conditions', 'error');
                    isValid = false;
                }
                
                return isValid;
            }
            
            isValidEmail(email) {
                const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                return emailRegex.test(email);
            }
            
            isValidPhone(phone) {
                const phoneRegex = /^[\d\s\-\+\(\)]+$/;
                return phoneRegex.test(phone) && phone.replace(/\D/g, '').length >= 10;
            }
            
            showFieldError(field, message) {
                const errorElement = document.getElementById(`${field}-error`);
                if (errorElement) {
                    errorElement.textContent = message;
                    errorElement.style.display = 'block';
                }
            }
            
            clearFieldError(field) {
                const errorElement = document.getElementById(`${field}-error`);
                if (errorElement) {
                    errorElement.textContent = '';
                    errorElement.style.display = 'none';
                }
            }
            
            clearAllErrors() {
                ['first_name', 'last_name', 'email', 'phone', 'role', 'password', 'confirm_password'].forEach(field => {
                    this.clearFieldError(field);
                });
                this.clearAlerts();
            }
            
            showAlert(message, type = 'error') {
                const alertDiv = document.createElement('div');
                alertDiv.className = `alert alert-${type}`;
                
                const icon = type === 'error' ? 'fa-exclamation-circle' : 'fa-check-circle';
                alertDiv.innerHTML = `
                    <i class="fas ${icon}"></i>
                    <span>${message}</span>
                `;
                
                this.alertContainer.innerHTML = '';
                this.alertContainer.appendChild(alertDiv);
                
                // Auto-hide success messages
                if (type === 'success') {
                    setTimeout(() => {
                        this.clearAlerts();
                    }, 5000);
                }
            }
            
            clearAlerts() {
                this.alertContainer.innerHTML = '';
            }
            
            setLoading(loading) {
                if (loading) {
                    this.registerButton.classList.add('loading');
                    this.registerButton.disabled = true;
                } else {
                    this.registerButton.classList.remove('loading');
                    this.registerButton.disabled = false;
                }
            }
            
            async handleRegistration() {
                if (!this.validateForm()) {
                    return;
                }
                
                const formData = new FormData(this.form);
                const data = {
                    first_name: formData.get('first_name'),
                    last_name: formData.get('last_name'),
                    email: formData.get('email'),
                    phone: formData.get('phone'),
                    password: formData.get('password'),
                    confirm_password: formData.get('confirm_password'),
                    role: formData.get('role') || 'buyer',
                    terms: formData.get('terms') ? '1' : '0'
                };
                
                this.setLoading(true);
                
                try {
                    const response = await fetch('register-api.php', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                        },
                        body: JSON.stringify(data)
                    });
                    
                    const result = await response.json();
                    console.log('Registration API Response:', result);
                    
                    if (result.success) {
                        this.showAlert(result.message || 'Registration successful! Redirecting to login page...', 'success');
                        setTimeout(() => {
                            window.location.href = result.redirect || 'login.html';
                        }, 2000);
                    } else {
                        this.showAlert(result.message || 'Registration failed. Please try again.');
                    }
                } catch (error) {
                    console.error('Registration error:', error);
                    this.showAlert('Network error. Please check your connection and try again.');
                } finally {
                    this.setLoading(false);
                }
            }
            
            handleSocialRegistration(provider) {
                // Placeholder for social registration
                this.showAlert(`${provider.charAt(0).toUpperCase() + provider.slice(1)} registration coming soon!`, 'error');
                
                // In a real implementation, you would redirect to the OAuth provider
                // window.location.href = `auth/${provider}.php`;
            }
        }
        
        // Initialize registration handler when DOM is ready
        document.addEventListener('DOMContentLoaded', () => {
            new RegistrationHandler();
        });
        
        // Utility functions for compatibility with existing script.js
        function showToast(message, type = 'info') {
            // Create a simple toast notification
            const toast = document.createElement('div');
            toast.style.cssText = `
                position: fixed;
                top: 20px;
                right: 20px;
                padding: 12px 20px;
                background: ${type === 'warning' ? '#f59e0b' : '#3b82f6'};
                color: white;
                border-radius: 8px;
                z-index: 9999;
                animation: slideIn 0.3s ease;
            `;
            toast.textContent = message;
            
            document.body.appendChild(toast);
            
            setTimeout(() => {
                toast.style.animation = 'slideOut 0.3s ease';
                setTimeout(() => {
                    document.body.removeChild(toast);
                }, 300);
            }, 3000);
        }
        
        // Add slide animations
        const style = document.createElement('style');
        style.textContent = `
            @keyframes slideIn {
                from { transform: translateX(100%); opacity: 0; }
                to { transform: translateX(0); opacity: 1; }
            }
            @keyframes slideOut {
                from { transform: translateX(0); opacity: 1; }
                to { transform: translateX(100%); opacity: 0; }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
